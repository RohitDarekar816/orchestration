<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oz — Agent Orchestration</title>
<script>
  if (localStorage.getItem('oz_dark') === 'true' || (!localStorage.getItem('oz_dark') && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
    document.documentElement.classList.add('dark');
  }
</script>
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = { darkMode: 'class' };
</script>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
  .agent-status-pending { @apply bg-yellow-100 text-yellow-800 dark:bg-yellow-900/40 dark:text-yellow-300; }
  .agent-status-running { @apply bg-blue-100 text-blue-800 dark:bg-blue-900/40 dark:text-blue-300; }
  .agent-status-completed { @apply bg-green-100 text-green-800 dark:bg-green-900/40 dark:text-green-300; }
  .agent-status-failed { @apply bg-red-100 text-red-800 dark:bg-red-900/40 dark:text-red-300; }
  .agent-status-cancelled { @apply bg-gray-100 text-gray-800 dark:bg-gray-700 dark:text-gray-300; }
</style>
</head>
<body class="bg-gray-50 dark:bg-gray-950">
  <div id="app" class="min-h-screen">
    <!-- Nav -->
    <nav class="bg-white dark:bg-gray-900 border-b border-gray-200 dark:border-gray-800 px-6 py-3 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <span class="text-2xl font-bold text-indigo-600 dark:text-indigo-400">Oz</span>
        <span class="text-sm text-gray-500 dark:text-gray-400">Agent Orchestration</span>
      </div>
      <div class="flex items-center gap-4">
        <button id="dark-toggle" onclick="toggleDark()" class="text-gray-500 dark:text-gray-400 hover:text-gray-700 dark:hover:text-gray-200 text-lg leading-none" title="Toggle dark mode">&#9681;</button>
        <div id="auth-section">
          <button onclick="openAuthModal()" class="text-sm text-indigo-600 dark:text-indigo-400 hover:text-indigo-800 dark:hover:text-indigo-300">Sign In</button>
        </div>
      </div>
    </nav>

    <div class="flex">
      <!-- Sidebar -->
      <aside class="w-56 bg-white dark:bg-gray-900 border-r border-gray-200 dark:border-gray-800 min-h-[calc(100vh-57px)] p-4 hidden md:block">
        <nav class="space-y-1">
          <a href="#" onclick="showPage('dashboard')" class="block px-3 py-2 rounded text-sm font-medium text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-800 sidebar-link" data-page="dashboard">Dashboard</a>
          <a href="#" onclick="showPage('agents')" class="block px-3 py-2 rounded text-sm font-medium text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-800 sidebar-link" data-page="agents">Agent Runs</a>
          <a href="#" onclick="showPage('launch')" class="block px-3 py-2 rounded text-sm font-medium text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-800 sidebar-link" data-page="launch">Launch Agent</a>
          <a href="#" onclick="showPage('skills')" class="block px-3 py-2 rounded text-sm font-medium text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-800 sidebar-link" data-page="skills">Skills</a>
          <a href="#" onclick="showPage('schedules')" class="block px-3 py-2 rounded text-sm font-medium text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-800 sidebar-link" data-page="schedules">Schedules</a>
          <a href="#" onclick="showPage('servers')" class="block px-3 py-2 rounded text-sm font-medium text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-800 sidebar-link" data-page="servers">Servers</a>
          <a href="#" onclick="showPage('secrets')" class="block px-3 py-2 rounded text-sm font-medium text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-800 sidebar-link" data-page="secrets">Secrets</a>
          <a href="#" onclick="showPage('chat')" class="block px-3 py-2 rounded text-sm font-medium text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-800 sidebar-link" data-page="chat">Chat</a>
        </nav>
      </aside>

      <!-- Main -->
      <main class="flex-1 p-6">
        <div id="page-content"></div>
      </main>
    </div>
    <!-- Auth Modal -->
    <div id="auth-overlay" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50">
      <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-xl dark:shadow-2xl w-full max-w-md mx-4 overflow-hidden" onclick="event.stopPropagation()">
        <div class="flex border-b border-gray-200 dark:border-gray-700">
          <button class="auth-tab active flex-1 px-4 py-3 text-sm font-medium text-center border-b-2 border-indigo-600 dark:border-indigo-400 text-indigo-600 dark:text-indigo-400" data-tab="login" onclick="showAuthTab('login')">Sign In</button>
          <button class="auth-tab flex-1 px-4 py-3 text-sm font-medium text-center border-b-2 border-transparent text-gray-500 dark:text-gray-400" data-tab="register" onclick="showAuthTab('register')">Register</button>
        </div>
        <div class="p-6">
          <div id="auth-error" class="hidden bg-red-50 dark:bg-red-900/30 text-red-600 dark:text-red-400 text-sm px-3 py-2 rounded mb-4"></div>

          <div id="login-form">
            <div class="mb-3">
              <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Email</label>
              <input id="login-email" type="email" class="w-full border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-100 rounded-lg px-3 py-2 text-sm" placeholder="you@team.com">
            </div>
            <div class="mb-4">
              <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Password</label>
              <input id="login-password" type="password" class="w-full border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-100 rounded-lg px-3 py-2 text-sm" placeholder="Enter your password">
            </div>
            <button onclick="doLogin()" class="w-full py-2 bg-indigo-600 dark:bg-indigo-500 text-white rounded-lg text-sm font-medium hover:bg-indigo-700 dark:hover:bg-indigo-600">Sign In</button>
          </div>

          <div id="register-form" class="hidden">
            <div class="mb-3">
              <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Full Name</label>
              <input id="reg-name" type="text" class="w-full border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-100 rounded-lg px-3 py-2 text-sm" placeholder="Your Name">
            </div>
            <div class="mb-3">
              <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Email</label>
              <input id="reg-email" type="email" class="w-full border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-100 rounded-lg px-3 py-2 text-sm" placeholder="you@team.com">
            </div>
            <div class="mb-4">
              <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Password</label>
              <input id="reg-password" type="password" class="w-full border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-100 rounded-lg px-3 py-2 text-sm" placeholder="Create a password">
            </div>
            <button onclick="doRegister()" class="w-full py-2 bg-indigo-600 dark:bg-indigo-500 text-white rounded-lg text-sm font-medium hover:bg-indigo-700 dark:hover:bg-indigo-600">Create Account</button>
          </div>

          <button onclick="closeAuthModal()" class="w-full mt-3 py-2 text-sm text-gray-500 dark:text-gray-400 hover:text-gray-700 dark:hover:text-gray-200">Cancel</button>
        </div>
      </div>
    </div>
  </div>

<script>
const API = window.location.origin + '/api';
let token = localStorage.getItem('oz_token');
let currentUser = null;

// Initialize
if (token) loadUser();

function toggleDark() {
  const html = document.documentElement;
  const isDark = html.classList.toggle('dark');
  localStorage.setItem('oz_dark', isDark);
}

// --- API helpers ---
async function api(method, path, body) {
  const opts = {
    method,
    headers: { 'Content-Type': 'application/json' },
  };
  if (token) opts.headers['Authorization'] = `Bearer ${token}`;
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch(API + path, opts);
  if (!r.ok) {
    const err = await r.json().catch(() => ({ detail: r.statusText }));
    throw new Error(err.detail || 'Request failed');
  }
  return r.json();
}

async function loadUser() {
  try {
    currentUser = await api('GET', '/auth/me');
    render();
  } catch {
    token = null;
    localStorage.removeItem('oz_token');
    render();
  }
}

// --- Auth Modal ---
function openAuthModal(tab) {
  const overlay = document.getElementById('auth-overlay');
  overlay.classList.remove('hidden');
  showAuthTab(tab || 'login');
}

function closeAuthModal() {
  document.getElementById('auth-overlay').classList.add('hidden');
}

function showAuthTab(tab) {
  document.querySelectorAll('.auth-tab').forEach(el => {
    el.classList.toggle('active', el.dataset.tab === tab);
    el.classList.toggle('border-indigo-600', el.dataset.tab === tab);
    el.classList.toggle('dark:border-indigo-400', el.dataset.tab === tab);
    el.classList.toggle('text-indigo-600', el.dataset.tab === tab);
    el.classList.toggle('dark:text-indigo-400', el.dataset.tab === tab);
    el.classList.toggle('border-transparent', el.dataset.tab !== tab);
    el.classList.toggle('text-gray-500', el.dataset.tab !== tab);
    el.classList.toggle('dark:text-gray-400', el.dataset.tab !== tab);
  });
  document.getElementById('login-form').classList.toggle('hidden', tab !== 'login');
  document.getElementById('register-form').classList.toggle('hidden', tab !== 'register');
  document.getElementById('auth-error').classList.add('hidden');
}

async function doLogin() {
  const email = document.getElementById('login-email').value;
  const password = document.getElementById('login-password').value;
  if (!email || !password) return;

  const errEl = document.getElementById('auth-error');
  errEl.classList.add('hidden');

  try {
    const formData = new URLSearchParams();
    formData.append('username', email);
    formData.append('password', password);
    const r = await fetch(API + '/auth/token', {
      method: 'POST',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body: formData,
    });
    if (!r.ok) {
      const err = await r.json().catch(() => ({ detail: 'Login failed' }));
      throw new Error(err.detail);
    }
    const d = await r.json();
    token = d.access_token;
    localStorage.setItem('oz_token', token);
    currentUser = d.user;
    closeAuthModal();
    render();
  } catch (e) {
    errEl.textContent = e.message;
    errEl.classList.remove('hidden');
  }
}

async function doRegister() {
  const email = document.getElementById('reg-email').value;
  const password = document.getElementById('reg-password').value;
  const name = document.getElementById('reg-name').value;
  if (!email || !password || !name) return;

  const errEl = document.getElementById('auth-error');
  errEl.classList.add('hidden');

  try {
    await api('POST', '/auth/register', {
      email, password, full_name: name,
    });
    document.getElementById('login-email').value = email;
    document.getElementById('login-password').value = password;
    showAuthTab('login');
    doLogin();
  } catch (e) {
    errEl.textContent = e.message;
    errEl.classList.remove('hidden');
  }
}

function logout() {
  token = null;
  currentUser = null;
  localStorage.removeItem('oz_token');
  render();
}

document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') closeAuthModal();
  if (e.key === 'Enter') {
    const overlay = document.getElementById('auth-overlay');
    if (overlay.classList.contains('hidden')) return;
    if (!document.getElementById('login-form').classList.contains('hidden')) {
      doLogin();
    } else {
      doRegister();
    }
  }
});

// --- Routing ---
function showPage(page) {
  if (activeWs) { activeWs.close(); activeWs = null; }
  document.querySelectorAll('.sidebar-link').forEach(el => {
    el.classList.toggle('bg-gray-100', el.dataset.page === page);
    el.classList.toggle('dark:bg-gray-800', el.dataset.page === page);
    el.classList.toggle('font-semibold', el.dataset.page === page);
  });
  const pages = {
    dashboard: renderDashboard,
    agents: renderAgents,
    launch: renderLaunch,
    skills: renderSkills,
    schedules: renderSchedules,
    servers: renderServers,
    secrets: renderSecrets,
    chat: renderChat,
  };
  (pages[page] || renderDashboard)();
}

// --- Render ---
function render() {
  const authEl = document.getElementById('auth-section');
  if (currentUser) {
    authEl.innerHTML = `
      <span class="text-sm text-gray-600 dark:text-gray-400">${currentUser.full_name}</span>
      <button onclick="logout()" class="text-sm text-red-600 dark:text-red-400 hover:text-red-800 dark:hover:text-red-300 ml-3">Sign Out</button>
    `;
  } else {
    authEl.innerHTML = `
      <button onclick="openAuthModal('register')" class="text-sm text-gray-600 dark:text-gray-400 hover:text-gray-800 dark:hover:text-gray-200 mr-3">Register</button>
      <button onclick="openAuthModal('login')" class="text-sm text-indigo-600 dark:text-indigo-400 hover:text-indigo-800 dark:hover:text-indigo-300">Sign In</button>
    `;
  }
  showPage('dashboard');
}

// --- Dashboard ---
async function renderDashboard() {
  const el = document.getElementById('page-content');
  el.innerHTML = '<div class="text-gray-500 dark:text-gray-400">Loading...</div>';

  if (!currentUser) {
    el.innerHTML = `<div class="text-center py-16">
      <h2 class="text-2xl font-bold text-gray-700 dark:text-gray-200">Welcome to Oz</h2>
      <p class="text-gray-500 dark:text-gray-400 mt-2">Sign in or create an account to manage your agent runs</p>
      <div class="mt-4 flex items-center justify-center gap-3">
        <button onclick="openAuthModal('login')" class="px-4 py-2 bg-indigo-600 dark:bg-indigo-500 text-white rounded-lg">Sign In</button>
        <button onclick="openAuthModal('register')" class="px-4 py-2 border border-indigo-600 dark:border-indigo-400 text-indigo-600 dark:text-indigo-400 rounded-lg">Register</button>
      </div>
    </div>`;
    return;
  }

  try {
    const stats = await api('GET', '/dashboard/stats');
    const agents = await api('GET', '/agents?limit=10');

    el.innerHTML = `
      <h1 class="text-2xl font-bold text-gray-900 dark:text-gray-100 mb-6">Dashboard</h1>
      <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-8">
        <div class="bg-white dark:bg-gray-800 rounded-xl border border-gray-200 dark:border-gray-700 p-5">
          <div class="text-sm text-gray-500 dark:text-gray-400">Total Runs</div>
          <div class="text-3xl font-bold text-gray-900 dark:text-gray-100 mt-1">${stats.total}</div>
        </div>
        <div class="bg-white dark:bg-gray-800 rounded-xl border border-gray-200 dark:border-gray-700 p-5">
          <div class="text-sm text-gray-500 dark:text-gray-400">Running</div>
          <div class="text-3xl font-bold text-blue-600 dark:text-blue-400 mt-1">${stats.running}</div>
        </div>
        <div class="bg-white dark:bg-gray-800 rounded-xl border border-gray-200 dark:border-gray-700 p-5">
          <div class="text-sm text-gray-500 dark:text-gray-400">Completed</div>
          <div class="text-3xl font-bold text-green-600 dark:text-green-400 mt-1">${stats.completed}</div>
        </div>
        <div class="bg-white dark:bg-gray-800 rounded-xl border border-gray-200 dark:border-gray-700 p-5">
          <div class="text-sm text-gray-500 dark:text-gray-400">Failed</div>
          <div class="text-3xl font-bold text-red-600 dark:text-red-400 mt-1">${stats.failed}</div>
        </div>
      </div>
      <h2 class="text-lg font-semibold text-gray-900 dark:text-gray-100 mb-3">Recent Runs</h2>
      ${agents.length === 0 ? '<p class="text-gray-500 dark:text-gray-400">No agent runs yet. <a href="#" onclick="showPage(\'launch\')" class="text-indigo-600 dark:text-indigo-400">Launch one</a>.</p>' : ''}
      ${agents.length > 0 ? `<div class="bg-white dark:bg-gray-800 rounded-xl border border-gray-200 dark:border-gray-700 overflow-hidden">
        <table class="w-full text-sm">
          <thead class="bg-gray-50 dark:bg-gray-800/50 text-left">
            <tr>
              <th class="px-4 py-3 font-medium text-gray-600 dark:text-gray-400">ID</th>
              <th class="px-4 py-3 font-medium text-gray-600 dark:text-gray-400">Agent</th>
              <th class="px-4 py-3 font-medium text-gray-600 dark:text-gray-400">Status</th>
              <th class="px-4 py-3 font-medium text-gray-600 dark:text-gray-400">Created</th>
              <th class="px-4 py-3 font-medium text-gray-600 dark:text-gray-400">Action</th>
            </tr>
          </thead>
          <tbody>
            ${agents.map(a => `
              <tr class="border-t border-gray-100 dark:border-gray-700 hover:bg-gray-50 dark:hover:bg-gray-700/50">
                <td class="px-4 py-3 font-mono text-gray-900 dark:text-gray-100">#${a.id}</td>
                <td class="px-4 py-3 text-gray-900 dark:text-gray-100">${a.agent_type}</td>
                <td class="px-4 py-3"><span class="inline-flex px-2 py-1 rounded-full text-xs font-medium agent-status-${a.status}">${a.status}</span></td>
                <td class="px-4 py-3 text-gray-500 dark:text-gray-400">${new Date(a.created_at).toLocaleString()}</td>
                <td class="px-4 py-3"><a href="#" onclick="showAgentDetail(${a.id})" class="text-indigo-600 dark:text-indigo-400 hover:text-indigo-800 dark:hover:text-indigo-300">View</a></td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      </div>` : ''}
    `;
  } catch (e) {
    el.innerHTML = `<div class="text-red-500 dark:text-red-400">Error: ${e.message}</div>`;
  }
}

// --- Agents List ---
async function renderAgents() {
  const el = document.getElementById('page-content');
  if (!currentUser) { el.innerHTML = '<p class="text-gray-500 dark:text-gray-400">Sign in to view agents.</p>'; return; }

  el.innerHTML = '<div class="text-gray-500 dark:text-gray-400">Loading...</div>';
  try {
    const agents = await api('GET', '/agents');
    el.innerHTML = `
      <h1 class="text-2xl font-bold text-gray-900 dark:text-gray-100 mb-6">Agent Runs</h1>
      <div class="bg-white dark:bg-gray-800 rounded-xl border border-gray-200 dark:border-gray-700 overflow-hidden">
        <table class="w-full text-sm">
          <thead class="bg-gray-50 dark:bg-gray-800/50 text-left">
            <tr>
              <th class="px-4 py-3 font-medium text-gray-600 dark:text-gray-400">ID</th>
              <th class="px-4 py-3 font-medium text-gray-600 dark:text-gray-400">Agent</th>
              <th class="px-4 py-3 font-medium text-gray-600 dark:text-gray-400">Status</th>
              <th class="px-4 py-3 font-medium text-gray-600 dark:text-gray-400">Started</th>
              <th class="px-4 py-3 font-medium text-gray-600 dark:text-gray-400">Finished</th>
              <th class="px-4 py-3 font-medium text-gray-600 dark:text-gray-400">Actions</th>
            </tr>
          </thead>
          <tbody>
            ${agents.map(a => `
              <tr class="border-t border-gray-100 dark:border-gray-700 hover:bg-gray-50 dark:hover:bg-gray-700/50">
                <td class="px-4 py-3 font-mono text-gray-900 dark:text-gray-100">#${a.id}</td>
                <td class="px-4 py-3 text-gray-900 dark:text-gray-100">${a.agent_type}</td>
                <td class="px-4 py-3"><span class="inline-flex px-2 py-1 rounded-full text-xs font-medium agent-status-${a.status}">${a.status}</span></td>
                <td class="px-4 py-3 text-gray-500 dark:text-gray-400">${a.started_at ? new Date(a.started_at).toLocaleString() : '-'}</td>
                <td class="px-4 py-3 text-gray-500 dark:text-gray-400">${a.finished_at ? new Date(a.finished_at).toLocaleString() : '-'}</td>
                <td class="px-4 py-3">
                  <a href="#" onclick="showAgentDetail(${a.id})" class="text-indigo-600 dark:text-indigo-400 hover:text-indigo-800 dark:hover:text-indigo-300 mr-3">View</a>
                  ${a.status === 'running' ? `<a href="#" onclick="cancelAgent(${a.id})" class="text-red-600 dark:text-red-400 hover:text-red-800 dark:hover:text-red-300">Cancel</a>` : ''}
                </td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      </div>
    `;
  } catch (e) {
    el.innerHTML = `<div class="text-red-500 dark:text-red-400">Error: ${e.message}</div>`;
  }
}

let activeWs = null;

// --- Agent Detail ---
async function showAgentDetail(id) {
  if (activeWs) { activeWs.close(); activeWs = null; }
  const el = document.getElementById('page-content');
  el.innerHTML = '<div class="text-gray-500 dark:text-gray-400">Loading...</div>';
  try {
    const agent = await api('GET', `/agents/${id}`);
    const logs = await api('GET', `/agents/${id}/logs`);
    el.innerHTML = `
      <div class="flex items-center gap-3 mb-6">
        <a href="#" onclick="showPage('agents')" class="text-gray-500 dark:text-gray-400 hover:text-gray-700 dark:hover:text-gray-200">&larr; Back</a>
        <h1 class="text-2xl font-bold text-gray-900 dark:text-gray-100">Agent Run #${agent.id}</h1>
        <span class="inline-flex px-2 py-1 rounded-full text-xs font-medium agent-status-${agent.status}">${agent.status}</span>
      </div>
      <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 mb-6">
        <div class="bg-white dark:bg-gray-800 rounded-xl border border-gray-200 dark:border-gray-700 p-4">
          <div class="text-sm text-gray-500 dark:text-gray-400">Agent Type</div>
          <div class="font-medium text-gray-900 dark:text-gray-100">${agent.agent_type}</div>
        </div>
        <div class="bg-white dark:bg-gray-800 rounded-xl border border-gray-200 dark:border-gray-700 p-4">
          <div class="text-sm text-gray-500 dark:text-gray-400">Started</div>
          <div class="font-medium text-gray-900 dark:text-gray-100">${agent.started_at ? new Date(agent.started_at).toLocaleString() : '-'}</div>
        </div>
        <div class="bg-white dark:bg-gray-800 rounded-xl border border-gray-200 dark:border-gray-700 p-4">
          <div class="text-sm text-gray-500 dark:text-gray-400">Exit Code</div>
          <div class="font-medium text-gray-900 dark:text-gray-100">${agent.exit_code !== null ? agent.exit_code : '-'}</div>
        </div>
      </div>
      ${agent.prompt ? `<div class="bg-white dark:bg-gray-800 rounded-xl border border-gray-200 dark:border-gray-700 p-4 mb-6">
        <div class="text-sm text-gray-500 dark:text-gray-400 mb-2">Prompt</div>
        <pre class="text-sm text-gray-800 dark:text-gray-200 whitespace-pre-wrap">${escapeHtml(agent.prompt)}</pre>
      </div>` : ''}
      <div class="bg-white dark:bg-gray-800 rounded-xl border border-gray-200 dark:border-gray-700">
        <div class="px-4 py-3 border-b border-gray-100 dark:border-gray-700 font-medium text-gray-700 dark:text-gray-300">Logs</div>
        <div id="log-container" class="p-4 max-h-96 overflow-y-auto font-mono text-xs leading-relaxed bg-gray-900 dark:bg-black text-green-400 dark:text-green-400 rounded-b-xl">
          ${logs.length === 0 ? '<span id="log-placeholder" class="text-gray-500 dark:text-gray-500">Waiting for logs...</span>' : logs.map(l => `<div>${escapeHtml(l.content)}</div>`).join('')}
        </div>
      </div>
    `;
    connectWs(id);
  } catch (e) {
    el.innerHTML = `<div class="text-red-500 dark:text-red-400">Error: ${e.message}</div>`;
  }
}

function connectWs(agentId) {
  const proto = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
  const wsUrl = `${proto}//${window.location.host}/api/agents/ws/${agentId}`;
  try {
    const ws = new WebSocket(wsUrl);
    activeWs = ws;
    ws.onmessage = (e) => {
      try {
        const data = JSON.parse(e.data);
        const container = document.getElementById('log-container');
        if (!container) return;
        const ph = document.getElementById('log-placeholder');
        if (ph) ph.remove();
        const div = document.createElement('div');
        div.textContent = data.content;
        container.appendChild(div);
        container.scrollTop = container.scrollHeight;
      } catch { /* ignore non-JSON messages */ }
    };
    ws.onclose = () => { if (activeWs === ws) activeWs = null; };
    ws.onerror = () => { if (activeWs === ws) activeWs = null; };
  } catch (e) {
    console.warn('WebSocket connection failed:', e);
  }
}

      </div>

      <div class="grid grid-cols-2 gap-3 mb-3">
        <div><input id="sv-tags" placeholder="Tags (comma-separated)" value="${isEdit && server.tags ? server.tags.join(', ') : ''}" class="w-full border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-100 rounded px-3 py-2 text-sm"></div>
        <div><input id="sv-desc" placeholder="Description" value="${isEdit ? escapeHtml(server.description || '') : ''}" class="w-full border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-100 rounded px-3 py-2 text-sm"></div>
      </div>

      <div class="flex gap-2">
        <button onclick="${isEdit ? `doEditServer(${server.id})` : 'doCreateServer()'}" class="px-3 py-2 bg-indigo-600 dark:bg-indigo-500 text-white rounded-lg text-sm">${isEdit ? 'Update Server' : 'Save Server'}</button>
        <button onclick="cancelServerForm()" class="px-3 py-2 border border-gray-300 dark:border-gray-600 text-gray-700 dark:text-gray-300 rounded-lg text-sm">Cancel</button>
      </div>
    </div>
  `;
  const authSelect = document.getElementById('sv-auth');
  function toggleAuthFields() {
    const isKey = authSelect.value === 'key';
    document.getElementById('sv-key-fields').style.display = isKey ? 'grid' : 'none';
    document.getElementById('sv-pass-fields').style.display = isKey ? 'none' : 'grid';
  }
  authSelect.onchange = toggleAuthFields;
  toggleAuthFields();
}

function cancelServerForm() {
  document.getElementById('server-form').innerHTML = '';
}

async function ensureSecret(name, value) {
  if (!value) return null;
  const secret = await api('POST', '/secrets', { name, value });
  return secret.id;
}

async function gatherServerData() {
  const tagsRaw = document.getElementById('sv-tags').value;
  const tags = tagsRaw ? tagsRaw.split(',').map(t => t.trim()).filter(Boolean) : [];
  const authType = document.getElementById('sv-auth').value;
  let sshKeySecretId = parseInt(document.getElementById('sv-key-secret').value) || null;
  let sshPasswordSecretId = parseInt(document.getElementById('sv-pass-secret').value) || null;
  if (authType === 'key') {
    const keyValue = document.getElementById('sv-key-value').value;
    if (keyValue) {
      sshKeySecretId = await ensureSecret(
        document.getElementById('sv-name').value + '_ssh_key',
        keyValue
      );
    }
  } else {
    const passValue = document.getElementById('sv-pass-value').value;
    if (passValue) {
      sshPasswordSecretId = await ensureSecret(
        document.getElementById('sv-name').value + '_ssh_pass',
        passValue
      );
    }
  }
  return {
    name: document.getElementById('sv-name').value,
    host: document.getElementById('sv-host').value,
    port: parseInt(document.getElementById('sv-port').value) || 22,
    username: document.getElementById('sv-user').value,
    auth_type: authType,
    ssh_key_secret_id: sshKeySecretId,
    ssh_password_secret_id: sshPasswordSecretId,
    tags,
    description: document.getElementById('sv-desc').value || null,
  };
}

async function doCreateServer() {
  try {
    await api('POST', '/servers', await gatherServerData());
    document.getElementById('server-form').innerHTML = '';
    renderServers();
  } catch (e) {
    alert('Error: ' + e.message);
  }
}

async function doEditServer(id) {
  try {
    await api('PUT', `/servers/${id}`, await gatherServerData());
    document.getElementById('server-form').innerHTML = '';
    renderServers();
  } catch (e) {
    alert('Error: ' + e.message);
  }
}

async function deleteServer(id) {
  if (!confirm('Delete this server?')) return;
  try {
    await api('DELETE', `/servers/${id}`);
    renderServers();
  } catch (e) {
    alert('Error: ' + e.message);
  }
}

// --- Secrets ---
async function renderSecrets() {
  const el = document.getElementById('page-content');
  if (!currentUser) { el.innerHTML = '<p class="text-gray-500 dark:text-gray-400">Sign in to manage secrets.</p>'; return; }
  el.innerHTML = '<div class="text-gray-500 dark:text-gray-400">Loading...</div>';
  try {
    const secrets = await api('GET', '/secrets');
    el.innerHTML = `
      <div class="flex items-center justify-between mb-6">
        <h1 class="text-2xl font-bold text-gray-900 dark:text-gray-100">Secrets</h1>
        <button onclick="showCreateSecret()" class="px-3 py-2 bg-indigo-600 dark:bg-indigo-500 text-white rounded-lg text-sm">+ New Secret</button>
      </div>
      <div id="secret-form"></div>
      <div class="bg-white dark:bg-gray-800 rounded-xl border border-gray-200 dark:border-gray-700 overflow-hidden">
        <table class="w-full text-sm">
          <thead class="bg-gray-50 dark:bg-gray-800/50 text-left">
            <tr>
              <th class="px-4 py-3 font-medium text-gray-600 dark:text-gray-400">Name</th>
              <th class="px-4 py-3 font-medium text-gray-600 dark:text-gray-400">Scope</th>
              <th class="px-4 py-3 font-medium text-gray-600 dark:text-gray-400">Created</th>
              <th class="px-4 py-3 font-medium text-gray-600 dark:text-gray-400">Actions</th>
            </tr>
          </thead>
          <tbody>
            ${secrets.length === 0 ? '<tr><td colspan="4" class="px-4 py-6 text-center text-gray-500 dark:text-gray-400">No secrets stored</td></tr>' :
              secrets.map(s => `
                <tr class="border-t border-gray-100 dark:border-gray-700">
                  <td class="px-4 py-3 font-medium text-gray-900 dark:text-gray-100">${s.name}</td>
                  <td class="px-4 py-3 text-gray-900 dark:text-gray-100">${s.scope}</td>
                  <td class="px-4 py-3 text-gray-500 dark:text-gray-400">${new Date(s.created_at).toLocaleString()}</td>
                  <td class="px-4 py-3"><button onclick="deleteSecret(${s.id})" class="text-red-600 dark:text-red-400 hover:text-red-800 dark:hover:text-red-300 text-sm">Delete</button></td>
                </tr>
              `).join('')}
          </tbody>
        </table>
      </div>
    `;
  } catch (e) {
    el.innerHTML = `<div class="text-red-500 dark:text-red-400">Error: ${e.message}</div>`;
  }
}

function showCreateSecret() {
  const el = document.getElementById('secret-form');
  el.innerHTML = `
    <div class="bg-white dark:bg-gray-800 rounded-xl border border-gray-200 dark:border-gray-700 p-4 mb-4">
      <h3 class="font-medium text-gray-900 dark:text-gray-100 mb-3">Add Secret</h3>
      <div class="grid grid-cols-2 gap-3 mb-3">
        <div><input id="secret-name" placeholder="Secret name (e.g. GITHUB_TOKEN)" class="w-full border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-100 rounded px-3 py-2 text-sm font-mono"></div>
        <div><input id="secret-value" type="password" placeholder="Value" class="w-full border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-100 rounded px-3 py-2 text-sm"></div>
      </div>
      <button onclick="doCreateSecret()" class="px-3 py-2 bg-indigo-600 dark:bg-indigo-500 text-white rounded-lg text-sm">Save Secret</button>
    </div>
  `;
}

async function doCreateSecret() {
  try {
    await api('POST', '/secrets', {
      name: document.getElementById('secret-name').value,
      value: document.getElementById('secret-value').value,
    });
    renderSecrets();
  } catch (e) {
    alert('Error: ' + e.message);
  }
}

async function deleteSecret(id) {
  if (!confirm('Delete this secret?')) return;
  await api('DELETE', `/secrets/${id}`);
  renderSecrets();
}

// --- Chat ---

async function renderChat() {
  const el = document.getElementById('page-content');
  if (!currentUser) { el.innerHTML = '<p class="text-gray-500 dark:text-gray-400">Sign in to use chat.</p>'; return; }

  const leonUrl = localStorage.getItem('oz_leon_url') || 'http://localhost:5366';

  el.innerHTML = `
    <div class="flex flex-col h-[calc(100vh-120px)]">
      <div class="flex items-center justify-between mb-3 flex-shrink-0">
        <h1 class="text-2xl font-bold text-gray-900 dark:text-gray-100">Chat — LEON</h1>
        <div class="flex items-center gap-2">
          <a href="${leonUrl}" target="_blank" rel="noopener noreferrer" class="text-sm text-indigo-600 dark:text-indigo-400 hover:text-indigo-800 dark:hover:text-indigo-300 underline">Open in new tab</a>
        </div>
      </div>
      <div class="flex-1 bg-white dark:bg-gray-800 rounded-xl border border-gray-200 dark:border-gray-700 overflow-hidden">
        <iframe src="${leonUrl}" class="w-full h-full border-0" title="LEON Chat" sandbox="allow-scripts allow-same-origin allow-forms allow-popups"></iframe>
      </div>
    </div>
  `;
}

// --- Utils ---
function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

// --- Start ---
render();
</script>
</body>
</html>
