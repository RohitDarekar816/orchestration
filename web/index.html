<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oz — Agent Orchestration</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
  .agent-status-pending { @apply bg-yellow-100 text-yellow-800; }
  .agent-status-running { @apply bg-blue-100 text-blue-800; }
  .agent-status-completed { @apply bg-green-100 text-green-800; }
  .agent-status-failed { @apply bg-red-100 text-red-800; }
  .agent-status-cancelled { @apply bg-gray-100 text-gray-800; }
</style>
</head>
<body class="bg-gray-50">
  <div id="app" class="min-h-screen">
    <!-- Nav -->
    <nav class="bg-white border-b border-gray-200 px-6 py-3 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <span class="text-2xl font-bold text-indigo-600">Oz</span>
        <span class="text-sm text-gray-500">Agent Orchestration</span>
      </div>
      <div class="flex items-center gap-4">
        <div id="auth-section">
          <button onclick="openAuthModal()" class="text-sm text-indigo-600 hover:text-indigo-800">Sign In</button>
        </div>
      </div>
    </nav>

    <div class="flex">
      <!-- Sidebar -->
      <aside class="w-56 bg-white border-r border-gray-200 min-h-[calc(100vh-57px)] p-4 hidden md:block">
        <nav class="space-y-1">
          <a href="#" onclick="showPage('dashboard')" class="block px-3 py-2 rounded text-sm font-medium text-gray-700 hover:bg-gray-100 sidebar-link" data-page="dashboard">Dashboard</a>
          <a href="#" onclick="showPage('agents')" class="block px-3 py-2 rounded text-sm font-medium text-gray-700 hover:bg-gray-100 sidebar-link" data-page="agents">Agent Runs</a>
          <a href="#" onclick="showPage('launch')" class="block px-3 py-2 rounded text-sm font-medium text-gray-700 hover:bg-gray-100 sidebar-link" data-page="launch">Launch Agent</a>
          <a href="#" onclick="showPage('skills')" class="block px-3 py-2 rounded text-sm font-medium text-gray-700 hover:bg-gray-100 sidebar-link" data-page="skills">Skills</a>
          <a href="#" onclick="showPage('schedules')" class="block px-3 py-2 rounded text-sm font-medium text-gray-700 hover:bg-gray-100 sidebar-link" data-page="schedules">Schedules</a>
          <a href="#" onclick="showPage('secrets')" class="block px-3 py-2 rounded text-sm font-medium text-gray-700 hover:bg-gray-100 sidebar-link" data-page="secrets">Secrets</a>
        </nav>
      </aside>

      <!-- Main -->
      <main class="flex-1 p-6">
        <div id="page-content"></div>
      </main>
    </div>
    <!-- Auth Modal -->
    <div id="auth-overlay" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50">
      <div class="bg-white rounded-2xl shadow-xl w-full max-w-md mx-4 overflow-hidden" onclick="event.stopPropagation()">
        <div class="flex border-b border-gray-200">
          <button class="auth-tab active flex-1 px-4 py-3 text-sm font-medium text-center border-b-2 border-indigo-600 text-indigo-600" data-tab="login" onclick="showAuthTab('login')">Sign In</button>
          <button class="auth-tab flex-1 px-4 py-3 text-sm font-medium text-center border-b-2 border-transparent text-gray-500" data-tab="register" onclick="showAuthTab('register')">Register</button>
        </div>
        <div class="p-6">
          <div id="auth-error" class="hidden bg-red-50 text-red-600 text-sm px-3 py-2 rounded mb-4"></div>

          <div id="login-form">
            <div class="mb-3">
              <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
              <input id="login-email" type="email" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm" placeholder="you@team.com">
            </div>
            <div class="mb-4">
              <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
              <input id="login-password" type="password" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm" placeholder="Enter your password">
            </div>
            <button onclick="doLogin()" class="w-full py-2 bg-indigo-600 text-white rounded-lg text-sm font-medium hover:bg-indigo-700">Sign In</button>
          </div>

          <div id="register-form" class="hidden">
            <div class="mb-3">
              <label class="block text-sm font-medium text-gray-700 mb-1">Full Name</label>
              <input id="reg-name" type="text" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm" placeholder="Your Name">
            </div>
            <div class="mb-3">
              <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
              <input id="reg-email" type="email" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm" placeholder="you@team.com">
            </div>
            <div class="mb-4">
              <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
              <input id="reg-password" type="password" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm" placeholder="Create a password">
            </div>
            <button onclick="doRegister()" class="w-full py-2 bg-indigo-600 text-white rounded-lg text-sm font-medium hover:bg-indigo-700">Create Account</button>
          </div>

          <button onclick="closeAuthModal()" class="w-full mt-3 py-2 text-sm text-gray-500 hover:text-gray-700">Cancel</button>
        </div>
      </div>
    </div>
  </div>

<script>
const API = window.location.origin + '/api';
let token = localStorage.getItem('oz_token');
let currentUser = null;

// Initialize
if (token) loadUser();

// --- API helpers ---
async function api(method, path, body) {
  const opts = {
    method,
    headers: { 'Content-Type': 'application/json' },
  };
  if (token) opts.headers['Authorization'] = `Bearer ${token}`;
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch(API + path, opts);
  if (!r.ok) {
    const err = await r.json().catch(() => ({ detail: r.statusText }));
    throw new Error(err.detail || 'Request failed');
  }
  return r.json();
}

async function loadUser() {
  try {
    currentUser = await api('GET', '/auth/me');
    render();
  } catch {
    token = null;
    localStorage.removeItem('oz_token');
    render();
  }
}

// --- Auth Modal ---
function openAuthModal(tab) {
  const overlay = document.getElementById('auth-overlay');
  overlay.classList.remove('hidden');
  showAuthTab(tab || 'login');
}

function closeAuthModal() {
  document.getElementById('auth-overlay').classList.add('hidden');
}

function showAuthTab(tab) {
  document.querySelectorAll('.auth-tab').forEach(el => {
    el.classList.toggle('active', el.dataset.tab === tab);
    el.classList.toggle('border-indigo-600', el.dataset.tab === tab);
    el.classList.toggle('text-indigo-600', el.dataset.tab === tab);
    el.classList.toggle('border-transparent', el.dataset.tab !== tab);
    el.classList.toggle('text-gray-500', el.dataset.tab !== tab);
  });
  document.getElementById('login-form').classList.toggle('hidden', tab !== 'login');
  document.getElementById('register-form').classList.toggle('hidden', tab !== 'register');
  document.getElementById('auth-error').classList.add('hidden');
}

async function doLogin() {
  const email = document.getElementById('login-email').value;
  const password = document.getElementById('login-password').value;
  if (!email || !password) return;

  const errEl = document.getElementById('auth-error');
  errEl.classList.add('hidden');

  try {
    const formData = new URLSearchParams();
    formData.append('username', email);
    formData.append('password', password);
    const r = await fetch(API + '/auth/token', {
      method: 'POST',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body: formData,
    });
    if (!r.ok) {
      const err = await r.json().catch(() => ({ detail: 'Login failed' }));
      throw new Error(err.detail);
    }
    const d = await r.json();
    token = d.access_token;
    localStorage.setItem('oz_token', token);
    currentUser = d.user;
    closeAuthModal();
    render();
  } catch (e) {
    errEl.textContent = e.message;
    errEl.classList.remove('hidden');
  }
}

async function doRegister() {
  const email = document.getElementById('reg-email').value;
  const password = document.getElementById('reg-password').value;
  const name = document.getElementById('reg-name').value;
  if (!email || !password || !name) return;

  const errEl = document.getElementById('auth-error');
  errEl.classList.add('hidden');

  try {
    await api('POST', '/auth/register', {
      email, password, full_name: name,
    });
    // Auto-login after register
    document.getElementById('login-email').value = email;
    document.getElementById('login-password').value = password;
    showAuthTab('login');
    doLogin();
  } catch (e) {
    errEl.textContent = e.message;
    errEl.classList.remove('hidden');
  }
}

function logout() {
  token = null;
  currentUser = null;
  localStorage.removeItem('oz_token');
  render();
}

// Enter key support
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') closeAuthModal();
  if (e.key === 'Enter') {
    const overlay = document.getElementById('auth-overlay');
    if (overlay.classList.contains('hidden')) return;
    if (!document.getElementById('login-form').classList.contains('hidden')) {
      doLogin();
    } else {
      doRegister();
    }
  }
});

// --- Routing ---
function showPage(page) {
  if (activeWs) { activeWs.close(); activeWs = null; }
  document.querySelectorAll('.sidebar-link').forEach(el => {
    el.classList.toggle('bg-gray-100', el.dataset.page === page);
    el.classList.toggle('font-semibold', el.dataset.page === page);
  });
  const pages = {
    dashboard: renderDashboard,
    agents: renderAgents,
    launch: renderLaunch,
    skills: renderSkills,
    schedules: renderSchedules,
    secrets: renderSecrets,
  };
  (pages[page] || renderDashboard)();
}

// --- Render ---
function render() {
  const authEl = document.getElementById('auth-section');
  if (currentUser) {
    authEl.innerHTML = `
      <span class="text-sm text-gray-600">${currentUser.full_name}</span>
      <button onclick="logout()" class="text-sm text-red-600 hover:text-red-800 ml-3">Sign Out</button>
    `;
  } else {
    authEl.innerHTML = `
      <button onclick="openAuthModal('register')" class="text-sm text-gray-600 hover:text-gray-800 mr-3">Register</button>
      <button onclick="openAuthModal('login')" class="text-sm text-indigo-600 hover:text-indigo-800">Sign In</button>
    `;
  }
  showPage('dashboard');
}

// --- Dashboard ---
async function renderDashboard() {
  const el = document.getElementById('page-content');
  el.innerHTML = '<div class="text-gray-500">Loading...</div>';

  if (!currentUser) {
    el.innerHTML = `<div class="text-center py-16">
      <h2 class="text-2xl font-bold text-gray-700">Welcome to Oz</h2>
      <p class="text-gray-500 mt-2">Sign in or create an account to manage your agent runs</p>
      <div class="mt-4 flex items-center justify-center gap-3">
        <button onclick="openAuthModal('login')" class="px-4 py-2 bg-indigo-600 text-white rounded-lg">Sign In</button>
        <button onclick="openAuthModal('register')" class="px-4 py-2 border border-indigo-600 text-indigo-600 rounded-lg">Register</button>
      </div>
    </div>`;
    return;
  }

  try {
    const stats = await api('GET', '/dashboard/stats');
    const agents = await api('GET', '/agents?limit=10');

    el.innerHTML = `
      <h1 class="text-2xl font-bold text-gray-900 mb-6">Dashboard</h1>
      <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-8">
        <div class="bg-white rounded-xl border border-gray-200 p-5">
          <div class="text-sm text-gray-500">Total Runs</div>
          <div class="text-3xl font-bold text-gray-900 mt-1">${stats.total}</div>
        </div>
        <div class="bg-white rounded-xl border border-gray-200 p-5">
          <div class="text-sm text-gray-500">Running</div>
          <div class="text-3xl font-bold text-blue-600 mt-1">${stats.running}</div>
        </div>
        <div class="bg-white rounded-xl border border-gray-200 p-5">
          <div class="text-sm text-gray-500">Completed</div>
          <div class="text-3xl font-bold text-green-600 mt-1">${stats.completed}</div>
        </div>
        <div class="bg-white rounded-xl border border-gray-200 p-5">
          <div class="text-sm text-gray-500">Failed</div>
          <div class="text-3xl font-bold text-red-600 mt-1">${stats.failed}</div>
        </div>
      </div>
      <h2 class="text-lg font-semibold text-gray-900 mb-3">Recent Runs</h2>
      ${agents.length === 0 ? '<p class="text-gray-500">No agent runs yet. <a href="#" onclick="showPage(\'launch\')" class="text-indigo-600">Launch one</a>.</p>' : ''}
      ${agents.length > 0 ? `<div class="bg-white rounded-xl border border-gray-200 overflow-hidden">
        <table class="w-full text-sm">
          <thead class="bg-gray-50 text-left">
            <tr>
              <th class="px-4 py-3 font-medium text-gray-600">ID</th>
              <th class="px-4 py-3 font-medium text-gray-600">Agent</th>
              <th class="px-4 py-3 font-medium text-gray-600">Status</th>
              <th class="px-4 py-3 font-medium text-gray-600">Created</th>
              <th class="px-4 py-3 font-medium text-gray-600">Action</th>
            </tr>
          </thead>
          <tbody>
            ${agents.map(a => `
              <tr class="border-t border-gray-100 hover:bg-gray-50">
                <td class="px-4 py-3 font-mono">#${a.id}</td>
                <td class="px-4 py-3">${a.agent_type}</td>
                <td class="px-4 py-3"><span class="inline-flex px-2 py-1 rounded-full text-xs font-medium agent-status-${a.status}">${a.status}</span></td>
                <td class="px-4 py-3 text-gray-500">${new Date(a.created_at).toLocaleString()}</td>
                <td class="px-4 py-3"><a href="#" onclick="showAgentDetail(${a.id})" class="text-indigo-600 hover:text-indigo-800">View</a></td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      </div>` : ''}
    `;
  } catch (e) {
    el.innerHTML = `<div class="text-red-500">Error: ${e.message}</div>`;
  }
}

// --- Agents List ---
async function renderAgents() {
  const el = document.getElementById('page-content');
  if (!currentUser) { el.innerHTML = '<p class="text-gray-500">Sign in to view agents.</p>'; return; }

  el.innerHTML = '<div class="text-gray-500">Loading...</div>';
  try {
    const agents = await api('GET', '/agents');
    el.innerHTML = `
      <h1 class="text-2xl font-bold text-gray-900 mb-6">Agent Runs</h1>
      <div class="bg-white rounded-xl border border-gray-200 overflow-hidden">
        <table class="w-full text-sm">
          <thead class="bg-gray-50 text-left">
            <tr>
              <th class="px-4 py-3 font-medium text-gray-600">ID</th>
              <th class="px-4 py-3 font-medium text-gray-600">Agent</th>
              <th class="px-4 py-3 font-medium text-gray-600">Status</th>
              <th class="px-4 py-3 font-medium text-gray-600">Started</th>
              <th class="px-4 py-3 font-medium text-gray-600">Finished</th>
              <th class="px-4 py-3 font-medium text-gray-600">Actions</th>
            </tr>
          </thead>
          <tbody>
            ${agents.map(a => `
              <tr class="border-t border-gray-100 hover:bg-gray-50">
                <td class="px-4 py-3 font-mono">#${a.id}</td>
                <td class="px-4 py-3">${a.agent_type}</td>
                <td class="px-4 py-3"><span class="inline-flex px-2 py-1 rounded-full text-xs font-medium agent-status-${a.status}">${a.status}</span></td>
                <td class="px-4 py-3 text-gray-500">${a.started_at ? new Date(a.started_at).toLocaleString() : '-'}</td>
                <td class="px-4 py-3 text-gray-500">${a.finished_at ? new Date(a.finished_at).toLocaleString() : '-'}</td>
                <td class="px-4 py-3">
                  <a href="#" onclick="showAgentDetail(${a.id})" class="text-indigo-600 hover:text-indigo-800 mr-3">View</a>
                  ${a.status === 'running' ? `<a href="#" onclick="cancelAgent(${a.id})" class="text-red-600 hover:text-red-800">Cancel</a>` : ''}
                </td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      </div>
    `;
  } catch (e) {
    el.innerHTML = `<div class="text-red-500">Error: ${e.message}</div>`;
  }
}

let activeWs = null;

// --- Agent Detail ---
async function showAgentDetail(id) {
  if (activeWs) { activeWs.close(); activeWs = null; }
  const el = document.getElementById('page-content');
  el.innerHTML = '<div class="text-gray-500">Loading...</div>';
  try {
    const agent = await api('GET', `/agents/${id}`);
    const logs = await api('GET', `/agents/${id}/logs`);
    el.innerHTML = `
      <div class="flex items-center gap-3 mb-6">
        <a href="#" onclick="showPage('agents')" class="text-gray-500 hover:text-gray-700">&larr; Back</a>
        <h1 class="text-2xl font-bold text-gray-900">Agent Run #${agent.id}</h1>
        <span class="inline-flex px-2 py-1 rounded-full text-xs font-medium agent-status-${agent.status}">${agent.status}</span>
      </div>
      <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 mb-6">
        <div class="bg-white rounded-xl border border-gray-200 p-4">
          <div class="text-sm text-gray-500">Agent Type</div>
          <div class="font-medium">${agent.agent_type}</div>
        </div>
        <div class="bg-white rounded-xl border border-gray-200 p-4">
          <div class="text-sm text-gray-500">Started</div>
          <div class="font-medium">${agent.started_at ? new Date(agent.started_at).toLocaleString() : '-'}</div>
        </div>
        <div class="bg-white rounded-xl border border-gray-200 p-4">
          <div class="text-sm text-gray-500">Exit Code</div>
          <div class="font-medium">${agent.exit_code !== null ? agent.exit_code : '-'}</div>
        </div>
      </div>
      ${agent.prompt ? `<div class="bg-white rounded-xl border border-gray-200 p-4 mb-6">
        <div class="text-sm text-gray-500 mb-2">Prompt</div>
        <pre class="text-sm text-gray-800 whitespace-pre-wrap">${escapeHtml(agent.prompt)}</pre>
      </div>` : ''}
      <div class="bg-white rounded-xl border border-gray-200">
        <div class="px-4 py-3 border-b border-gray-100 font-medium text-gray-700">Logs</div>
        <div id="log-container" class="p-4 max-h-96 overflow-y-auto font-mono text-xs leading-relaxed bg-gray-900 text-green-400 rounded-b-xl">
          ${logs.length === 0 ? '<span id="log-placeholder" class="text-gray-500">Waiting for logs...</span>' : logs.map(l => `<div>${escapeHtml(l.content)}</div>`).join('')}
        </div>
      </div>
    `;
    connectWs(id);
  } catch (e) {
    el.innerHTML = `<div class="text-red-500">Error: ${e.message}</div>`;
  }
}

function connectWs(agentId) {
  const proto = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
  const wsUrl = `${proto}//${window.location.host}/api/agents/ws/${agentId}`;
  try {
    const ws = new WebSocket(wsUrl);
    activeWs = ws;
    ws.onmessage = (e) => {
      try {
        const data = JSON.parse(e.data);
        const container = document.getElementById('log-container');
        if (!container) return;
        const ph = document.getElementById('log-placeholder');
        if (ph) ph.remove();
        const div = document.createElement('div');
        div.textContent = data.content;
        container.appendChild(div);
        container.scrollTop = container.scrollHeight;
      } catch { /* ignore non-JSON messages like pong */ }
    };
    ws.onclose = () => { if (activeWs === ws) activeWs = null; };
    ws.onerror = () => { if (activeWs === ws) activeWs = null; };
  } catch (e) {
    console.warn('WebSocket connection failed:', e);
  }
}

async function cancelAgent(id) {
  if (!confirm('Cancel this agent run?')) return;
  await api('POST', `/agents/${id}/cancel`);
  renderAgents();
}

// --- Launch ---
async function renderLaunch() {
  const el = document.getElementById('page-content');
  if (!currentUser) { el.innerHTML = '<p class="text-gray-500">Sign in to launch agents.</p>'; return; }
  let skillOpts = '';
  try {
    const skills = await api('GET', '/skills');
    if (skills.length > 0) {
      skillOpts = `<option value="">None</option>` + skills.map(s => `<option value="${s.id}">${escapeHtml(s.name)}</option>`).join('');
    }
  } catch {}
  el.innerHTML = `
    <h1 class="text-2xl font-bold text-gray-900 mb-6">Launch Agent</h1>
    <div class="bg-white rounded-xl border border-gray-200 p-6 max-w-2xl">
      <div class="mb-4">
        <label class="block text-sm font-medium text-gray-700 mb-1">Agent Type</label>
        <select id="launch-agent-type" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm">
          <option value="opencode">OpenCode</option>
          <option value="claude-code">Claude Code</option>
          <option value="codex">Codex CLI</option>
          <option value="gemini-cli">Gemini CLI</option>
          <option value="custom">Custom</option>
        </select>
      </div>
      <div class="mb-4">
        <label class="block text-sm font-medium text-gray-700 mb-1">Skill (optional)</label>
        <select id="launch-skill" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm">
          ${skillOpts || '<option value="">No skills available</option>'}
        </select>
      </div>
      <div class="mb-4">
        <label class="block text-sm font-medium text-gray-700 mb-1">Prompt</label>
        <textarea id="launch-prompt" rows="6" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm font-mono" placeholder="Describe the task for the agent..."></textarea>
      </div>
      <div class="mb-4">
        <label class="block text-sm font-medium text-gray-700 mb-1">Max Runtime (seconds)</label>
        <input id="launch-timeout" type="number" value="3600" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm">
      </div>
      <button onclick="doLaunch()" class="px-4 py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 text-sm font-medium">
        Launch Agent
      </button>
      <div id="launch-result" class="mt-4"></div>
    </div>
  `;
}

async function doLaunch() {
  const el = document.getElementById('launch-result');
  el.innerHTML = 'Launching...';
  const skillSelect = document.getElementById('launch-skill');
  const skillId = skillSelect ? parseInt(skillSelect.value) : null;
  try {
    const data = await api('POST', '/agents/launch', {
      agent_type: document.getElementById('launch-agent-type').value,
      prompt: document.getElementById('launch-prompt').value,
      skill_id: skillId || undefined,
      max_runtime: parseInt(document.getElementById('launch-timeout').value) || 3600,
    });
    el.innerHTML = `<div class="text-green-600">Agent launched! ID: <strong>${data.id}</strong> Status: ${data.status}</div>
      <button onclick="showAgentDetail(${data.id})" class="mt-2 text-indigo-600 hover:text-indigo-800 text-sm">View Run</button>`;
  } catch (e) {
    el.innerHTML = `<div class="text-red-500">Error: ${e.message}</div>`;
  }
}

// --- Skills ---
async function renderSkills() {
  const el = document.getElementById('page-content');
  if (!currentUser) { el.innerHTML = '<p class="text-gray-500">Sign in to view skills.</p>'; return; }
  el.innerHTML = '<div class="text-gray-500">Loading...</div>';
  try {
    const skills = await api('GET', '/skills');
    el.innerHTML = `
      <div class="flex items-center justify-between mb-6">
        <h1 class="text-2xl font-bold text-gray-900">Skills</h1>
        <button onclick="showCreateSkill()" class="px-3 py-2 bg-indigo-600 text-white rounded-lg text-sm">+ New Skill</button>
      </div>
      <div id="skill-form"></div>
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        ${skills.length === 0 ? '<p class="text-gray-500 col-span-2">No skills defined.</p>' :
          skills.map(s => `
            <div class="bg-white rounded-xl border border-gray-200 p-4">
              <div class="font-medium text-gray-900">${s.name}</div>
              <div class="text-sm text-gray-500 mt-1">${s.description || 'No description'}</div>
              <div class="flex items-center gap-2 mt-3">
                <span class="text-xs bg-gray-100 px-2 py-1 rounded">${s.agent_type}</span>
                <span class="text-xs text-gray-400">v${s.version}</span>
                <button onclick="runSkill(${s.id})" class="ml-auto text-xs px-2 py-1 bg-indigo-600 text-white rounded hover:bg-indigo-700">Run</button>
              </div>
            </div>
          `).join('')}
      </div>
    `;
  } catch (e) {
    el.innerHTML = `<div class="text-red-500">Error: ${e.message}</div>`;
  }
}

function showCreateSkill() {
  const el = document.getElementById('skill-form');
  el.innerHTML = `
    <div class="bg-white rounded-xl border border-gray-200 p-4 mb-4">
      <h3 class="font-medium mb-3">Create Skill</h3>
      <div class="grid grid-cols-2 gap-3 mb-3">
        <div><input id="skill-name" placeholder="Skill name" class="w-full border border-gray-300 rounded px-3 py-2 text-sm"></div>
        <div>
          <select id="skill-agent" class="w-full border border-gray-300 rounded px-3 py-2 text-sm">
            <option value="opencode">OpenCode</option>
            <option value="claude-code">Claude Code</option>
            <option value="codex">Codex CLI</option>
          </select>
        </div>
      </div>
      <div class="mb-3"><textarea id="skill-desc" placeholder="Description" rows="2" class="w-full border border-gray-300 rounded px-3 py-2 text-sm"></textarea></div>
      <div class="mb-3"><textarea id="skill-prompt" placeholder="System prompt" rows="4" class="w-full border border-gray-300 rounded px-3 py-2 text-sm font-mono"></textarea></div>
      <button onclick="doCreateSkill()" class="px-3 py-2 bg-indigo-600 text-white rounded-lg text-sm">Save Skill</button>
    </div>
  `;
}

async function doCreateSkill() {
  try {
    await api('POST', '/skills', {
      name: document.getElementById('skill-name').value,
      description: document.getElementById('skill-desc').value,
      agent_type: document.getElementById('skill-agent').value,
      system_prompt: document.getElementById('skill-prompt').value,
    });
    renderSkills();
  } catch (e) {
    alert('Error: ' + e.message);
  }
}

async function runSkill(skillId) {
  const prompt = prompt('Enter prompt for skill (or leave blank):');
  if (prompt === null) return;
  try {
    const data = await api('POST', `/skills/${skillId}/execute`, { prompt });
    alert(`Skill launched! Agent run #${data.id}`);
  } catch (e) {
    alert('Error: ' + e.message);
  }
}

// --- Schedules ---
async function renderSchedules() {
  const el = document.getElementById('page-content');
  if (!currentUser) { el.innerHTML = '<p class="text-gray-500">Sign in to view schedules.</p>'; return; }
  el.innerHTML = '<div class="text-gray-500">Loading...</div>';
  try {
    const schedules = await api('GET', '/schedules');
    el.innerHTML = `
      <div class="flex items-center justify-between mb-6">
        <h1 class="text-2xl font-bold text-gray-900">Schedules</h1>
        <button onclick="showCreateSchedule()" class="px-3 py-2 bg-indigo-600 text-white rounded-lg text-sm">+ New Schedule</button>
      </div>
      <div id="schedule-form"></div>
      <div class="bg-white rounded-xl border border-gray-200 overflow-hidden">
        <table class="w-full text-sm">
          <thead class="bg-gray-50 text-left">
            <tr>
              <th class="px-4 py-3 font-medium text-gray-600">Name</th>
              <th class="px-4 py-3 font-medium text-gray-600">Cron</th>
              <th class="px-4 py-3 font-medium text-gray-600">Agent</th>
              <th class="px-4 py-3 font-medium text-gray-600">Active</th>
              <th class="px-4 py-3 font-medium text-gray-600">Last Run</th>
            </tr>
          </thead>
          <tbody>
            ${schedules.length === 0 ? '<tr><td colspan="5" class="px-4 py-6 text-center text-gray-500">No schedules</td></tr>' :
              schedules.map(s => `
                <tr class="border-t border-gray-100">
                  <td class="px-4 py-3 font-medium">${s.name}</td>
                  <td class="px-4 py-3 font-mono">${s.cron_expr}</td>
                  <td class="px-4 py-3">${s.agent_type}</td>
                  <td class="px-4 py-3">
                    <button onclick="toggleSchedule(${s.id}, ${!s.is_active})" class="px-2 py-1 rounded text-xs font-medium ${s.is_active ? 'bg-green-100 text-green-700' : 'bg-gray-100 text-gray-500'}">${s.is_active ? 'Active' : 'Inactive'}</button>
                  </td>
                  <td class="px-4 py-3 text-gray-500">${s.last_run_at ? new Date(s.last_run_at).toLocaleString() : 'Never'}</td>
                </tr>
              `).join('')}
          </tbody>
        </table>
      </div>
    `;
  } catch (e) {
    el.innerHTML = `<div class="text-red-500">Error: ${e.message}</div>`;
  }
}

function showCreateSchedule() {
  const el = document.getElementById('schedule-form');
  el.innerHTML = `
    <div class="bg-white rounded-xl border border-gray-200 p-4 mb-4">
      <h3 class="font-medium mb-3">Create Schedule</h3>
      <div class="grid grid-cols-2 gap-3 mb-3">
        <div><input id="sched-name" placeholder="Schedule name" class="w-full border border-gray-300 rounded px-3 py-2 text-sm"></div>
        <div><input id="sched-cron" placeholder="Cron expression (e.g. 0 9 * * 1)" class="w-full border border-gray-300 rounded px-3 py-2 text-sm font-mono"></div>
      </div>
      <div class="grid grid-cols-2 gap-3 mb-3">
        <div>
          <select id="sched-agent" class="w-full border border-gray-300 rounded px-3 py-2 text-sm">
            <option value="opencode">OpenCode</option>
            <option value="claude-code">Claude Code</option>
            <option value="codex">Codex CLI</option>
          </select>
        </div>
      </div>
      <div class="mb-3"><textarea id="sched-prompt" placeholder="Prompt template" rows="3" class="w-full border border-gray-300 rounded px-3 py-2 text-sm font-mono"></textarea></div>
      <button onclick="doCreateSchedule()" class="px-3 py-2 bg-indigo-600 text-white rounded-lg text-sm">Save Schedule</button>
    </div>
  `;
}

async function doCreateSchedule() {
  try {
    await api('POST', '/schedules', {
      name: document.getElementById('sched-name').value,
      cron_expr: document.getElementById('sched-cron').value,
      agent_type: document.getElementById('sched-agent').value,
      prompt_template: document.getElementById('sched-prompt').value,
    });
    renderSchedules();
  } catch (e) {
    alert('Error: ' + e.message);
  }
}

async function toggleSchedule(id, active) {
  await api('POST', `/schedules/${id}/toggle?active=${active}`);
  renderSchedules();
}

// --- Secrets ---
async function renderSecrets() {
  const el = document.getElementById('page-content');
  if (!currentUser) { el.innerHTML = '<p class="text-gray-500">Sign in to manage secrets.</p>'; return; }
  el.innerHTML = '<div class="text-gray-500">Loading...</div>';
  try {
    const secrets = await api('GET', '/secrets');
    el.innerHTML = `
      <div class="flex items-center justify-between mb-6">
        <h1 class="text-2xl font-bold text-gray-900">Secrets</h1>
        <button onclick="showCreateSecret()" class="px-3 py-2 bg-indigo-600 text-white rounded-lg text-sm">+ New Secret</button>
      </div>
      <div id="secret-form"></div>
      <div class="bg-white rounded-xl border border-gray-200 overflow-hidden">
        <table class="w-full text-sm">
          <thead class="bg-gray-50 text-left">
            <tr>
              <th class="px-4 py-3 font-medium text-gray-600">Name</th>
              <th class="px-4 py-3 font-medium text-gray-600">Scope</th>
              <th class="px-4 py-3 font-medium text-gray-600">Created</th>
              <th class="px-4 py-3 font-medium text-gray-600">Actions</th>
            </tr>
          </thead>
          <tbody>
            ${secrets.length === 0 ? '<tr><td colspan="4" class="px-4 py-6 text-center text-gray-500">No secrets stored</td></tr>' :
              secrets.map(s => `
                <tr class="border-t border-gray-100">
                  <td class="px-4 py-3 font-medium">${s.name}</td>
                  <td class="px-4 py-3">${s.scope}</td>
                  <td class="px-4 py-3 text-gray-500">${new Date(s.created_at).toLocaleString()}</td>
                  <td class="px-4 py-3"><button onclick="deleteSecret(${s.id})" class="text-red-600 hover:text-red-800 text-sm">Delete</button></td>
                </tr>
              `).join('')}
          </tbody>
        </table>
      </div>
    `;
  } catch (e) {
    el.innerHTML = `<div class="text-red-500">Error: ${e.message}</div>`;
  }
}

function showCreateSecret() {
  const el = document.getElementById('secret-form');
  el.innerHTML = `
    <div class="bg-white rounded-xl border border-gray-200 p-4 mb-4">
      <h3 class="font-medium mb-3">Add Secret</h3>
      <div class="grid grid-cols-2 gap-3 mb-3">
        <div><input id="secret-name" placeholder="Secret name (e.g. GITHUB_TOKEN)" class="w-full border border-gray-300 rounded px-3 py-2 text-sm font-mono"></div>
        <div><input id="secret-value" type="password" placeholder="Value" class="w-full border border-gray-300 rounded px-3 py-2 text-sm"></div>
      </div>
      <button onclick="doCreateSecret()" class="px-3 py-2 bg-indigo-600 text-white rounded-lg text-sm">Save Secret</button>
    </div>
  `;
}

async function doCreateSecret() {
  try {
    await api('POST', '/secrets', {
      name: document.getElementById('secret-name').value,
      value: document.getElementById('secret-value').value,
    });
    renderSecrets();
  } catch (e) {
    alert('Error: ' + e.message);
  }
}

async function deleteSecret(id) {
  if (!confirm('Delete this secret?')) return;
  await api('DELETE', `/secrets/${id}`);
  renderSecrets();
}

// --- Utils ---
function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

// --- Start ---
render();
</script>
