services:
  # oz-agent is not a long-running service — it's built as a reusable image that
  # the API spawns on demand via DockerAgentRunner. Build it with:
  #   docker compose build oz-agent
  oz-agent:
    build:
      context: ./agent
      dockerfile: Dockerfile
    image: oz-agent:latest
    profiles:
      - build

  api:
    build:
      context: ../backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://oz:oz@db:5432/oz
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=change-me-in-production
      - OZ_RUNNER=docker
      - OZ_AGENT_NETWORK=host
      - OZ_LLAMACPP_URL=http://localhost:11435/v1
      - OZ_OPENCODE_MODEL=openai/gpt-4o-mini
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  web:
    image: nginx:alpine
    ports:
      - "8090:80"
    volumes:
      - ../web:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api

  worker:
    build:
      context: ../backend
      dockerfile: Dockerfile
    command: celery -A app.worker.scheduler.celery_app worker --loglevel=info
    environment:
      - DATABASE_URL=postgresql+asyncpg://oz:oz@db:5432/oz
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=change-me-in-production
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  beat:
    build:
      context: ../backend
      dockerfile: Dockerfile
    command: celery -A app.worker.scheduler.celery_app beat --loglevel=info
    environment:
      - DATABASE_URL=postgresql+asyncpg://oz:oz@db:5432/oz
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=change-me-in-production
    depends_on:
      redis:
        condition: service_started
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=oz
      - POSTGRES_PASSWORD=oz
      - POSTGRES_DB=oz
    expose:
      - "5432"
    volumes:
      - oz_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U oz"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  llama-cpp:
    build:
      context: ./llama-cpp
      dockerfile: Dockerfile
    ports:
      - "11435:8080"
    volumes:
      - oz_llama_models:/models
    environment:
      LLAMA_ARG_MODEL: /models/qwen2.5-1.5b-instruct-q4_k_m.gguf
      LLAMA_ARG_MODEL_URL: https://huggingface.co/Qwen/Qwen2.5-1.5B-Instruct-GGUF/resolve/main/qwen2.5-1.5b-instruct-q4_k_m.gguf
      LLAMA_ARG_CTX_SIZE: "32768"
      LLAMA_ARG_N_PARALLEL: "1"
      LLAMA_ARG_PORT: "8080"
    command: ["--host", "0.0.0.0", "--port", "8080", "-c", "32768", "-np", "1", "-t", "4", "-tb", "4"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 300s

  leon:
    build:
      context: ../leon
      dockerfile: ../docker/leon/Dockerfile
    ports:
      - "5366:5366"
    environment:
      LEON_NODE_ENV: production
      LEON_PORT: "5366"
      LEON_HOST: http://0.0.0.0
      LEON_LANG: en-US
      LEON_LLM: groq/llama-3.1-8b-instant
      LEON_GROQ_API_KEY: ${GROQ_API_KEY}
      LEON_LLAMACPP_BASE_URL: http://llama-cpp:8080/v1
      LEON_OVER_HTTP: "true"
      LEON_WAKE_WORD: "false"
      LEON_STT: "false"
      LEON_TTS: "false"
      LEON_ROUTING_MODE: smart
      LEON_AFTER_SPEECH: "false"
      LEON_TELEMETRY: "false"
      LEON_TIME_ZONE: UTC
      LEON_HTTP_API_KEY: dev-key-123
      OZ_API_URL: http://api:8000/api
      OZ_EMAIL: admin@oz.local
      OZ_PASSWORD: admin123
      OZ_DEFAULT_AGENT_TYPE: opencode
      OZ_DEFAULT_MAX_RUNTIME: "300"
    volumes:
      - leon_profile:/root/.leon
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      llama-cpp:
        condition: service_healthy

volumes:
  oz_pg_data:
  oz_llama_models:
  leon_profile:
